services:
  app:
    build: ./docker
    container_name: gs_portal_app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-gs_portal}
      DB_USER: ${DB_USER:-portal_user}
      DB_PASS: ${DB_PASS:-portal_pass}
      MONDAY_API_TOKEN: ${MONDAY_API_TOKEN:-}
      MONDAY_DOMAIN: ${MONDAY_DOMAIN:-}
      MOCK_MONDAY: ${MOCK_MONDAY:-true}
      APP_SECRET: ${APP_SECRET:-local_dev_secret_change_me}
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-Client Portal}
      APP_URL: ${APP_URL:-}
      AGENCY_NAME: ${AGENCY_NAME:-Agency}
      BRAND_PRIMARY_COLOR: ${BRAND_PRIMARY_COLOR:-#6366f1}
      BRAND_SECONDARY_COLOR: ${BRAND_SECONDARY_COLOR:-#111827}
      BRAND_PRIMARY_LIGHT: ${BRAND_PRIMARY_LIGHT:-#eef2ff}
      BRAND_LOGO_INITIALS: ${BRAND_LOGO_INITIALS:-A}
      BRAND_LOGO_PATH: ${BRAND_LOGO_PATH:-}
      FAVICON_URL: ${FAVICON_URL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: gs_portal_db
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: ${DB_NAME:-gs_portal}
      MYSQL_USER: ${DB_USER:-portal_user}
      MYSQL_PASSWORD: ${DB_PASS:-portal_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: gs_portal_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_pass
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
